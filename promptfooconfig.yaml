description: Evaluate Terraform AWS implementation quality across multiple models using an included skill

extensions:
  - file://setup.js:beforeAll

prompts:
  - |
    {{prompt}}

providers:
  - file://providers/opencode-sdk-gpt-5-4.yaml
  - file://providers/opencode-sdk-gpt-5-5.yaml

evaluateOptions:
  cache: false
  repeat: 1
  
defaultTest:
  vars:
    common_prompt: file://shared/common-prompt.txt
    common_grader: file://shared/common-grader.txt

tests:
  - file://tests/*.yaml